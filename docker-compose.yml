services:
  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BUILD_VERSION: ${BUILD_VERSION:-dev}
      REQUEST_DELAY_MS: ${REQUEST_DELAY_MS:-0}
      HOST: 0.0.0.0
      PORT: 12986
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_DB_HOST: postgres
      POSTGRES_DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-file_diff_engine}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TMP_DIR: /app/tmp
      PUBLIC_GITHUB_TOKEN: ${PUBLIC_GITHUB_TOKEN:-}
      PRIVATE_GITHUB_TOKEN: ${PRIVATE_GITHUB_TOKEN:-}
      GITHUB_BEARER_PROVIDER_URL: ${GITHUB_BEARER_PROVIDER_URL:-}
      GITHUB_BEARER_PROVIDER_BEARER: ${GITHUB_BEARER_PROVIDER_BEARER:-}
      ADMIN_BEARER_TOKEN: ${ADMIN_BEARER_TOKEN:-}
      VIEWER_BEARER_TOKEN: ${VIEWER_BEARER_TOKEN:-}
      LOG_COPILOT_API_AUTH_HEADER: ${LOG_COPILOT_API_AUTH_HEADER:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5.2-codex}
      CODEX_BIN: ${CODEX_BIN:-codex}
      CODEX_TIMEOUT_MS: ${CODEX_TIMEOUT_MS:-7200000}
      CODEX_OUTPUT_LIMIT: ${CODEX_OUTPUT_LIMIT:-1000000}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENCODE_BIN: ${OPENCODE_BIN:-opencode}
      OPENCODE_TIMEOUT_MS: ${OPENCODE_TIMEOUT_MS:-7200000}
      OPENCODE_OUTPUT_LIMIT: ${OPENCODE_OUTPUT_LIMIT:-1000000}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-file-diff-agent}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-file-diff-agent@users.noreply.github.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:12986:12986"
    volumes:
      - ./repositories_data:/app/tmp
      - ./codex_data:/home/docker/.codex
      - ./cargo_cache:/home/docker/.cargo
      - ./rust_project_cache:/rust_project_cache
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-file_diff_engine}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d file_diff_engine"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:8-alpine
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
