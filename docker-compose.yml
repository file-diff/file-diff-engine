services:
  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BUILD_VERSION: ${BUILD_VERSION:-dev}
      REQUEST_DELAY_MS: ${REQUEST_DELAY_MS:-0}
      HOST: 0.0.0.0
      PORT: 12986
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_DB_HOST: postgres
      POSTGRES_DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-file_diff_engine}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TMP_DIR: /app/tmp
      PUBLIC_GITHUB_TOKEN: ${PUBLIC_GITHUB_TOKEN:-}
      PRIVATE_GITHUB_TOKEN: ${PRIVATE_GITHUB_TOKEN:-}
      COPILOT_GITHUB_TOKEN: ${COPILOT_GITHUB_TOKEN:-}
      GITHUB_BEARER_PROVIDER_URL: ${GITHUB_BEARER_PROVIDER_URL:-}
      GITHUB_BEARER_PROVIDER_BEARER: ${GITHUB_BEARER_PROVIDER_BEARER:-}
      REVERT_TO_COMMIT_BEARER_TOKEN: ${REVERT_TO_COMMIT_BEARER_TOKEN:-}
      MERGE_BRANCH_BEARER_TOKEN: ${MERGE_BRANCH_BEARER_TOKEN:-}
      CREATE_TASK_BEARER_TOKEN: ${CREATE_TASK_BEARER_TOKEN:-}
      GITHUB_OPERATIONS_BEARER_TOKEN: ${GITHUB_OPERATIONS_BEARER_TOKEN:-}
    ports:
      - "127.0.0.1:12986:12986"
    volumes:
      - ./repositories_data:/app/tmp
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-file_diff_engine}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d file_diff_engine"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:8-alpine
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
