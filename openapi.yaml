openapi: 3.1.0
info:
  title: file-diff-engine API
  version: 1.0.0
  description: >
    REST API for submitting GitHub repositories for asynchronous processing and
    querying the indexed file metadata for a resolved commit.
servers:
  - url: http://127.0.0.1:12986
    description: Local development server
tags:
  - name: Jobs
    description: Create processing jobs and retrieve job results.
  - name: Health
    description: Service health status.
paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns a simple health status for the API process.
      operationId: getHealth
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
  /api/jobs:
    post:
      tags:
        - Jobs
      summary: Create or reuse a processing job
      description: >
        Resolves the supplied git ref to a commit hash. If a job for that commit
        already exists, the existing job is returned instead of enqueuing a new one.
      operationId: createJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobRequest"
            examples:
              repositoryRef:
                value:
                  repo: facebook/react
                  ref: v18.0.0
      responses:
        "201":
          description: A new job was created and enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCreatedResponse"
              example:
                id: 0123456789abcdef0123456789abcdef01234567
                status: waiting
        "200":
          description: A job for the resolved commit already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCreatedResponse"
              example:
                id: 0123456789abcdef0123456789abcdef01234567
                status: completed
        "400":
          description: Missing required fields or invalid repository format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingFields:
                  value:
                    error: Both 'repo' and 'ref' are required.
                invalidRepo:
                  value:
                    error: Invalid repo format. Expected 'owner/repo' (e.g. 'facebook/react').
  /api/jobs/{id}:
    get:
      tags:
        - Jobs
      summary: Get job status and progress
      description: Returns metadata about a previously created job.
      operationId: getJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job details were found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobInfo"
              example:
                id: 0123456789abcdef0123456789abcdef01234567
                repo: facebook/react
                ref: v18.0.0
                status: active
                progress: 42.5
                total_files: 200
                processed_files: 85
                created_at: "2024-01-01T00:00:00.000Z"
                updated_at: "2024-01-01T00:01:00.000Z"
        "404":
          description: No job exists for the supplied ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Job not found.
  /api/jobs/{id}/files:
    get:
      tags:
        - Jobs
      summary: Get processed file metadata
      description: >
        Returns the file metadata currently stored for the job. The response shape
        is intentionally compact because the frontend depends on it.
      operationId: getJobFiles
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: File metadata for the job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobFilesResponse"
              example:
                job_id: 0123456789abcdef0123456789abcdef01234567
                status: completed
                progress: 100
                files:
                  - t: t
                    path: src/index.ts
                    s: 1234
                    update: "2024-01-01T12:00:00+00:00"
                    commit: abc123def456
                    hash: 557db03de997c86a4a028e1ebd3a1ceb225be238
        "404":
          description: No job exists for the supplied ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Job not found.
components:
  parameters:
    JobId:
      name: id
      in: path
      required: true
      description: >
        Job identifier. In practice this is the resolved commit SHA returned when
        the job was created.
      schema:
        type: string
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    JobRequest:
      type: object
      additionalProperties: false
      required:
        - repo
        - ref
      properties:
        repo:
          type: string
          description: GitHub repository in owner/repo format.
          example: facebook/react
        ref:
          type: string
          description: Tag, branch name, or commit SHA to process.
          example: v18.0.0
    JobCreatedResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - status
      properties:
        id:
          type: string
          description: Resolved commit SHA used as the job identifier.
          example: 0123456789abcdef0123456789abcdef01234567
        status:
          $ref: "#/components/schemas/JobStatus"
    JobStatus:
      type: string
      enum:
        - waiting
        - active
        - completed
        - failed
    JobInfo:
      type: object
      additionalProperties: false
      required:
        - id
        - repo
        - ref
        - status
        - progress
        - total_files
        - processed_files
        - created_at
        - updated_at
      properties:
        id:
          type: string
        repo:
          type: string
        ref:
          type: string
        status:
          $ref: "#/components/schemas/JobStatus"
        progress:
          type: number
        total_files:
          type: integer
        processed_files:
          type: integer
        error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    JobFilesResponse:
      type: object
      additionalProperties: false
      required:
        - job_id
        - status
        - progress
        - files
      properties:
        job_id:
          type: string
        status:
          $ref: "#/components/schemas/JobStatus"
        progress:
          type: number
        files:
          type: array
          items:
            $ref: "#/components/schemas/CompactFileRecord"
    CompactFileRecord:
      type: object
      additionalProperties: false
      required:
        - t
        - path
        - s
        - update
        - commit
        - hash
      properties:
        t:
          type: string
          enum:
            - d
            - t
            - b
            - x
            - s
          description: d=directory, t=text, b=binary, x=executable, s=symlink.
        path:
          type: string
          description: File path relative to the repository root.
        s:
          type: integer
          description: File size in bytes.
        update:
          type: string
          description: ISO-8601 timestamp of the last commit that touched the file.
        commit:
          type: string
          description: SHA of the last commit that touched the file.
        hash:
          type: string
          description: Git blob hash for the file content.
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string
